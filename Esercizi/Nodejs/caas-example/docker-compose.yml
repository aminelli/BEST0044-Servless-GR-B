version:  '3.8'

services:

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    hostname: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: customers_db
      MYSQL_USER: caas_user
      MYSQL_PASSWORD: caas_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql
    networks:
      - caas-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 15s
      timeout: 5s
      retries: 5

  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webapp
    hostname: webapp
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - app-logs-data:/app/logs
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - caas-network
    environment:
      NODE_ENV: development
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: caas_user
      DB_PASSWORD: caas_pass
      DB_NAME: customers_db
      PORT: 3000
      CLOUD_PROVIDER: local
      RATE_LIMIT_WINDOW_MINUTES: 15
      RATE_LIMIT_MAX_REQUESTS: 100
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 50s

networks:
  caas-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  app-logs-data:
    driver: local